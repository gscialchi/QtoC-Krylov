# This file contains the default parameter configurations that yield the
# figures present in the final version of the paper

DISABLE_DOER: False # if True, bypasses Doer functionality altogether. No calculation will be loaded or saved
DOER_DIR: 'default'

DISABLE_STORE: False # if True, disables store functionality. No operator will be loaded or saved
STORE_DIR: 'default'

SHOW_FIGURES: False # show figures at runtime
SAVE_FIGURES: True
FIG_DIR: 'default' # where to store figures
FIGURES_USETEX: False # whether LaTeX will be used to render fonts in figures. See: https://matplotlib.org/stable/users/explain/text/usetex.html
FIGURES_USEPHYSICS: False # whether the package physics will be used to render maths in figures

# ---- General calculation parameters for the harmonic oscillator ----
HO_q0: 1 # position of initial state in phase space
HO_p0: 0
HO_s: 0.1 # standard deviation of classical distribution

HO_a: 0.5 # defines how much overlap between the distribution in one step and the next (a=0 max. overlap, a > 1 no overlap)

HO_N_res: 300 # number of points in phase space for the classical distribution. Make sure is enough to resolve packet!
HO_N_sigma_res: 5 # sigmas of space between the packet center (at all times) and limits of the phase-space box.
# this also defines integration limits for calculating the matrix elements of the initial quantum coherent ensemble
# make sure the box includes the whole evolution

HO_fid: 0.999999999 # fidelity of truncated quantum coherent state

# Parameters specific to figs. 1 and 2
HO_fig_1_and_2_n_steps: 200 # number of time-steps for evolution
HO_fig_1_and_2_hbars: [0.0625, 0.03125, 0.015625, 0.0078125] # hbars for figs. 1 and 2.

# Parameters specific to fig. 3
HO_fig_3_n_steps: 60 # number of time-steps for evolution
HO_fig_3_hbars: [0.03125, 0.00390625] # hbars for fig. 3.
HM_fig_3_states: [0, 1, 2, 3, 15, 35, 55] # which states to show in plot

# ---- General calculation parameters for the Harper map ----
HM_k: 0.05 # map parameter

HM_q0: 0.4
HM_p0: 0.5
HM_s: 0.025

HM_N_res: 300 # make sure is enough to resolve packet for the whole evolution!

# Parameters specific to figs. 4 and 5
HM_fig_4_and_5_n_steps: 200
HM_fig_4_and_5_N_qus: [32, 64, 128, 256] # values of quantum Hilbert space dimension

# Parameters specific to fig. 6
HM_fig_6_n_steps: 60
HM_fig_6_N_qus: [64, 2048]
HM_fig_6_states: [0, 1, 2, 3, 15, 35, 55]

# Parameters specific to fig. 7
HM_fig_7_n_steps: 200
HM_fig_7_N_qus: [64, 128, 256, 512]

# Parameters specific to fig. 8
HM_fig_8_n_steps: 60
HM_fig_8_N_qu: 256
HM_fig_8_states: [0, 17, 55]
